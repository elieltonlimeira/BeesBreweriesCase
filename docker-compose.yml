x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  image: bees-airflow:latest
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # NOTE: for production, switch to CeleryExecutor and add Redis + workers
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
    PYTHONPATH: /opt/airflow
    # Do NOT expose full config in production (contains DB credentials and Fernet key)
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "non-sensitive-only"
    # Use a dedicated secret separate from the Fernet key
    AIRFLOW__WEBSERVER__SECRET_KEY: ${WEBSERVER_SECRET_KEY}
    # MinIO / S3 config
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    BRONZE_BUCKET: ${BRONZE_BUCKET:-brewery-bronze}
    SILVER_BUCKET: ${SILVER_BUCKET:-brewery-silver}
    GOLD_BUCKET: ${GOLD_BUCKET:-brewery-gold}
    # API config
    API_BASE_URL: https://api.openbrewerydb.org/v1/breweries
    API_PAGE_SIZE: "200"
    API_MAX_RETRIES: "3"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./tests:/opt/airflow/tests
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: bees-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    # Pinned to a specific release for reproducible builds
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: bees-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: bees-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/${BRONZE_BUCKET:-brewery-bronze};
        mc mb --ignore-existing local/${SILVER_BUCKET:-brewery-silver};
        mc mb --ignore-existing local/${GOLD_BUCKET:-brewery-gold};
        echo 'Buckets initialized successfully.';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    restart: on-failure

  airflow-init:
    <<: *airflow-common
    container_name: bees-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
        airflow db migrate &&
        airflow users create
          --username ${AIRFLOW_ADMIN_USER:-admin}
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
          --firstname Admin
          --lastname User
          --role Admin
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} 2>&1 | grep -v 'already exist' || true &&
        echo 'Airflow initialized successfully.';
      "
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: bees-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: bees-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
