name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install PySpark Connect extras
        run: pip install "pyspark[connect]==4.1.1"

      - name: Lint (ruff)
        run: python -m ruff check src/ tests/ dags/

      - name: Unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          MINIO_ACCESS_KEY: test-access-key
          MINIO_SECRET_KEY: test-secret-key
          MINIO_ENDPOINT: http://localhost:9000
          BRONZE_BUCKET: test-bronze
          SILVER_BUCKET: test-silver
          GOLD_BUCKET: test-gold
          API_BASE_URL: https://api.openbrewerydb.org/v1/breweries
          API_PAGE_SIZE: "5"
          API_MAX_RETRIES: "2"

      - name: Integration tests (pipeline)
        run: python -m pytest tests/integration/test_full_pipeline.py -v --tb=short --no-cov
        env:
          MINIO_ACCESS_KEY: test-access-key
          MINIO_SECRET_KEY: test-secret-key
          MINIO_ENDPOINT: http://localhost:9000
          BRONZE_BUCKET: test-bronze
          SILVER_BUCKET: test-silver
          GOLD_BUCKET: test-gold
          API_BASE_URL: https://api.openbrewerydb.org/v1/breweries
          API_PAGE_SIZE: "5"
          API_MAX_RETRIES: "2"
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
